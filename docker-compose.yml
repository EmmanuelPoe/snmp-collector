version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: snmp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - snmp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snmp-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_HOST: postgres
      DUCKDB_PATH: /data/db/metrics.db
      MANAGER_URL: http://manager:8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - ./data/db:/data/db:ro
    networks:
      - snmp-network
    depends_on:
      postgres:
        condition: service_healthy
      manager:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: snmp-frontend
    environment:
      REACT_APP_API_URL: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - snmp-network
    depends_on:
      backend:
        condition: service_started
    stdin_open: true
    tty: true

  manager:
    build: ./manager
    container_name: snmp-manager
    ports:
      - "8001:8000"
    volumes:
      - ./data/db:/data/db
      - ./data/dead-letter:/data/dead-letter
      - ./data/registry:/data/registry
    environment:
      - MANAGER_API_KEY=${MANAGER_API_KEY:-change-me-in-production}
      - DB_PATH=/data/db/metrics.db
      - REGISTRY_PATH=/data/registry/registry.json
      - DEAD_LETTER_PATH=/data/dead-letter
      - BACKEND_URL=http://backend:8000
    restart: unless-stopped
    networks:
      - snmp-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  agent:
    build: ./agent
    container_name: snmp-agent
    environment:
      - MANAGER_URL=http://manager:8000
      - MANAGER_API_KEY=${MANAGER_API_KEY:-change-me-in-production}
      - AGENT_HOSTNAME=${AGENT_HOSTNAME:-snmp-agent-01}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-60}
      - UPLOAD_MAX_ROWS=500
      - UPLOAD_MAX_AGE_SECONDS=60
      - RETRY_MAX_AGE_SECONDS=3600
      - QUEUE_PATH=/data/queue
      - AGENT_ID_PATH=/data/agent_id
    volumes:
      - ./data/agent-queue:/data/queue
      - ./data/agent-id:/data
    networks:
      - snmp-network
    depends_on:
      manager:
        condition: service_healthy
    restart: unless-stopped

  snmp-simulator:
    build:
      context: ./snmp-simulator
      dockerfile: Dockerfile
    container_name: snmp-simulator
    ports:
      - "1161:161/udp"
    networks:
      - snmp-network

networks:
  snmp-network:
    driver: bridge

volumes:
  postgres_data:
