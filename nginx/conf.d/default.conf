server {
    listen 80;
    server_name _;

    # Re-resolve upstream container IPs at request time via Docker's embedded
    # DNS, so rebuilding backend/frontend (new container IP) does not strand
    # nginx on a stale address (cause of intermittent 502s). Hostnames are held
    # in variables to force runtime resolution instead of one-time startup
    # resolution (the behaviour of `upstream {}` / literal proxy_pass).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/internal/ {
        deny all;
    }

    location /api/ {
        # `set` must precede `rewrite ... break` — break ends the rewrite phase,
        # which would otherwise skip the set and leave the upstream var empty.
        set $backend_upstream backend:8000;
        # Strip the /api/ prefix, then proxy (matches the old `proxy_pass .../;`).
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream/health;
        proxy_set_header Host $host;
    }

    location / {
        set $frontend_upstream frontend:80;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
